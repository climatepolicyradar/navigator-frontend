name: Update app token
on:
  workflow_dispatch:
    inputs:
      # trunk-ignore(checkov/CKV_GHA_7)
      environment:
        type: environment
        description: Environment
        required: true
        default: staging

      stack:
        description: Pulumi stack
        required: true
        type: choice
        options:
          - frontend/cpr-staging
          - frontend/cpr-production
          - frontend/mcf-staging
          - frontend/mcf-production
          - frontend/cclw-staging
          - frontend/cclw-production
          - frontend/ccc-staging
          - frontend/ccc-production

      jwt_token:
        description: JWT token to validate and set
        required: true
        type: string

env:
  AWS_REGION: eu-west-1
  DEPLOY_FROM_MAIN_BRANCH_ONLY: False
  DEPLOY_TO_PROD_STACK_ALLOWED: true
permissions:
  id-token: write
  contents: write
  pull-requests: write
jobs:
  update_token:
    environment: ${{ github.event.inputs.environment }}
    name: Update app token for ${{ github.event.inputs.stack }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v5.1.1
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/navigator-infra-github-actions
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: ${{ env.AWS_REGION }}

      - name: Install Pulumi
        uses: pulumi/actions@v6
        with:
          stack-name: climatepolicyradar/${{ github.event.inputs.stack }}
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Install Python dependencies for JWT validation and YAML handling
        run: |
          python -m pip install --upgrade pip
          pip install PyJWT PyYAML

      - name: Install GitHub CLI
        run: |
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | sudo dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg
          echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | sudo tee /etc/apt/sources.list.d/github-cli.list > /dev/null
          sudo apt update
          sudo apt install gh -y

      - name: Configure Git
        run: |
          git config --global user.name "cpr-tech-admin"
          git config --global user.email "tech@climatepolicyradar.org"

      - name: Update app token on "${{ github.event.inputs.environment }}"
        run: |
          DEBUG=1 ./.github/workflows/scripts/update_app_token.sh \
            "${{ github.event.inputs.environment }}" \
            "${{ github.event.inputs.stack }}" \
            "${{ github.event.inputs.jwt_token }}"
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
