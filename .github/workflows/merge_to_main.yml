name: Merge to main
on:
  push:
    branches:
      - main
      - push-to-ecrt

# trunk-ignore(checkov/CKV2_GHA_1)
permissions: write-all
jobs:
  # Trunk check
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
      - name: Generate tsconfig.json
        run: |
          cp tsconfig.base.json tsconfig.json
          sed -i "s/__THEME__/$THEME/g" tsconfig.json
      - run: npm install
      - uses: trunk-io/trunk-action@v1
        with:
          arguments: --ci

  # Release builds for each theme
  release:
    runs-on: ubuntu-latest
    needs: [code-quality]
    strategy:
      fail-fast: false
      matrix:
        theme: [cpr, cclw, mcf, ccc]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.13.0

      # build
      - run: |
          export THEME=${{ matrix.theme }}
          make build

      # release
      # most of this is taken from
      # https://docs.github.com/en/actions/use-cases-and-examples/deploying/deploying-to-amazon-elastic-container-service#creating-the-workflow
      - name: Configure AWS credentials (staging)
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID_STAGING }}:role/navigator-frontend-github-actions
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: eu-west-1
      - name: Login to Amazon ECR (staging)
        id: login-ecr-staging
        uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7
      - name: Build, tag, and push image to Amazon ECR (staging)
        id: build-image-staging
        env:
          ECR_REGISTRY: ${{ secrets.DOCKER_REGISTRY_STAGING }}
          IMAGE_TAG: ${{ github.sha }}
          AWS_REGION: eu-west-1
          ECR_REPOSITORY: navigator-frontend-${{ matrix.theme }}
          THEME: ${{ matrix.theme }}
        run: |
          docker build --build-arg THEME=${THEME} -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Configure aws credentials (production)
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID_PROD }}:role/navigator-frontend-github-actions
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: eu-west-1
      - name: Login to Amazon ECR (production)
        id: login-ecr-prod
        uses: aws-actions/amazon-ecr-login@19d944daaa35f0fa1d3f7f8af1d3f2e5de25c5b7

      - name: Build, tag, and push image to Amazon ECR (production)
        id: build-image-prod
        env:
          ECR_REGISTRY: ${{ secrets.DOCKER_REGISTRY_PROD }}
          IMAGE_TAG: ${{ github.sha }}
          AWS_REGION: eu-west-1
          ECR_REPOSITORY: navigator-frontend-${{ matrix.theme }}
          THEME: ${{ matrix.theme }}
        run: |
          docker build --build-arg THEME=${THEME} -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  # Deploy Storybook
  storybook:
    runs-on: ubuntu-latest
    env:
      THEME: cpr
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1
      - name: Generate tsconfig.json
        run: |
          cp tsconfig.base.json tsconfig.json
          sed -i "s/__THEME__/$THEME/g" tsconfig.json
      - run: npm install
      - run: npm run build-storybook
      - name: Upload to S3
        run: |
          aws s3 sync --delete ./storybook-static s3://storybook.climatepolicyradar.org
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-west-1

  # Check if we have any infra changes
  changes:
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.parse.outputs.projects }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            staging-frontend-cpr:
              - 'infra/Pulumi.cpr-staging.yaml'
              - 'infra/__main__.py'

            staging-frontend-mcf:
              - 'infra/Pulumi.mcf-staging.yaml'
              - 'infra/__main__.py'

            staging-frontend-cclw:
              - 'infra/Pulumi.cclw-staging.yaml'
              - 'infra/__main__.py'

            staging-frontend-ccc:
              - 'infra/Pulumi.ccc-staging.yaml'
              - 'infra/__main__.py'

            staging-shared-resources:
              - 'infra/platform/**'

            production-frontend-cpr:
              - 'infra/Pulumi.cpr-production.yaml'
              - 'infra/__main__.py'

            production-frontend-mcf:
              - 'infra/Pulumi.mcf-production.yaml'
              - 'infra/__main__.py'

            production-frontend-cclw:
              - 'infra/Pulumi.cclw-production.yaml'
              - 'infra/__main__.py'

            production-frontend-ccc:
              - 'infra/Pulumi.ccc-production.yaml'
              - 'infra/__main__.py'

      - id: parse
        run: |
          CHANGES='${{ steps.filter.outputs.changes }}'
          CHANGES=${CHANGES:-[]}
          echo "projects=$(echo "$CHANGES" | jq -c '.')" >> "$GITHUB_OUTPUT"

  # Pulumi commands
  pulumi-up:
    needs: changes
    if: needs.changes.outputs.projects != '[]'
    runs-on: ubuntu-latest
    environment: ${{ startsWith(matrix.project, 'production-') && 'production' || 'staging' }}
    strategy:
      matrix:
        project: ${{ fromJSON(needs.changes.outputs.projects) }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7

      - name: Determine project directory
        id: project_dir
        run: |
          project="${{ matrix.project }}"
          if [[ "$project" == staging-frontend-* || "$project" == production-frontend-* ]]; then
            echo "value=infra" >> "$GITHUB_OUTPUT"
          else
            echo "value=infra/platform" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine stack name
        id: stack
        run: |
          project="${{ matrix.project }}"
          if [[ "$project" =~ ^(staging|production)-frontend-([a-z0-9-]+)$ ]]; then
            environment="${BASH_REMATCH[1]}"
            theme="${BASH_REMATCH[2]}"
            echo "value=frontend/${theme}-${environment}" >> "$GITHUB_OUTPUT"
            echo "environment=${environment}" >> "$GITHUB_OUTPUT"
          elif [[ "$project" =~ ^(staging|production)-shared-resources$ ]]; then
            environment="${BASH_REMATCH[1]}"
            echo "value=platform/${environment}" >> "$GITHUB_OUTPUT"
            echo "environment=${environment}" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported project format: ${project}" >&2
            exit 1
          fi

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        env:
          AWS_REGION: eu-west-1
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/navigator-infra-github-actions
          role-session-name: GitHub_to_AWS_via_FederatedOIDC_${{ steps.stack.outputs.environment }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install pulumi
        uses: pulumi/actions@v7
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Install dependencies
        working-directory: ${{ steps.project_dir.outputs.value }}
        run: uv sync

      - name: Pulumi up
        working-directory: ${{ steps.project_dir.outputs.value }}
        run: pulumi up --yes --skip-preview --stack climatepolicyradar/${{ steps.stack.outputs.value }}
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          DEPLOY_TO_PROD_STACK_ALLOWED: true
