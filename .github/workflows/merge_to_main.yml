  # test
  code-quality:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
      - name: Generate tsconfig.json
        run: |
          cp tsconfig.base.json tsconfig.json
          sed -i "s/__THEME__/$THEME/g" tsconfig.json
      - run: npm install
      - uses: trunk-io/trunk-action@v1
        with:
          arguments: --ci

  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
      - run: npm install
      - run: cp .env.example .env
      - name: Generate tsconfig.json
        run: |
          cp tsconfig.base.json tsconfig.json
          sed -i "s/__THEME__/$THEME/g" tsconfig.json
        env:
          THEME: cpr
      - name: Run vitest - core functionality
        run: npm run test
        # This is needed to pass the results on to the trunk-io/analytics-uploader
        continue-on-error: true
        env:
          THEME: cpr
      - name: Run vitest - new features
        run: npm run test
        # This is needed to pass the results on to the trunk-io/analytics-uploader
        continue-on-error: true
        env:
          THEME: cpr
          E2E_TEST_FEATURE_FLAGS: true

      - name: Upload vitest results to Trunk.io
        uses: trunk-io/analytics-uploader@v2
        with:
          junit-paths: "**/vitest.xml"
          token: ${{ secrets.TRUNK_TOKEN }}
          org-slug: ${{ secrets.TRUNK_ORG_SLUG }}

  test-e2e:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        theme: [cpr, cclw, mcf, ccc]
        shardIndex: [1, 2]
        shardTotal: [2]
    env:
      PLAYWRIGHT_BROWSERS_PATH: $HOME/.cache/ms-playwright
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
          cache: npm

      - run: npm ci

      - run: cp .env.example .env

      - name: Generate tsconfig.json
        run: |
          cp tsconfig.base.json tsconfig.json
          sed -i "s/__THEME__/${{ matrix.theme }}/g" tsconfig.json

      - name: Cache Next.js build
        uses: actions/cache@v5
        with:
          path: .next/cache
          key: ${{ runner.os }}-nextjs-${{ matrix.theme }}-${{ hashFiles('**/package-lock.json') }}-${{ hashFiles('src/**') }}
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ matrix.theme }}-${{ hashFiles('**/package-lock.json') }}-

      - run: THEME=${{ matrix.theme }} npm run build
        env:
          NODE_ENV: production

      - name: Copy static assets to standalone
        run: |
          cp -r public .next/standalone/public
          cp -r .next/static .next/standalone/.next/static

      - name: Cache Playwright browsers
        uses: actions/cache@v5
        id: playwright-cache
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright Browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
        timeout-minutes: 5

      - name: Install Playwright System Dependencies
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
        timeout-minutes: 2
        continue-on-error: true

      - name: Verify Playwright Installation
        run: npx playwright install chromium --dry-run || npx playwright install chromium
        env:
          PLAYWRIGHT_BROWSERS_PATH: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
        timeout-minutes: 3

      - name: Run Tests - core functionality
        continue-on-error: true
        env:
          THEME: ${{ matrix.theme }}
          PLAYWRIGHT_BROWSERS_PATH: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
        run: npx playwright test tests/${{ matrix.theme }}/ --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - name: Run Tests - new features
        continue-on-error: true
        env:
          THEME: ${{ matrix.theme }}
          PLAYWRIGHT_BROWSERS_PATH: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          E2E_TEST_FEATURE_FLAGS: true
        run: npx playwright test tests/${{ matrix.theme }}/ --shard=${{ matrix.shardIndex }}/${{ matrix.shardTotal }}

      - name: Upload Test Results to Trunk.io
        uses: trunk-io/analytics-uploader@v2
        env:
          THEME: ${{ matrix.theme }}
          PLAYWRIGHT_BROWSERS_PATH: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
        with:
          junit-paths: test-results-${{ matrix.theme }}/playwright.xml
          token: ${{ secrets.TRUNK_TOKEN }}
          org-slug: ${{ secrets.TRUNK_ORG_SLUG }}

  release:
    runs-on: ubuntu-latest
    needs: [code-quality, test, test-e2e]
    strategy:
      fail-fast: false
      matrix:
        theme: [cpr, cclw, mcf, ccc]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.13.0

      # build
      - run: |
          export THEME=${{ matrix.theme }}
          make build

      # release
      # most of this is taken from
      # https://docs.github.com/en/actions/use-cases-and-examples/deploying/deploying-to-amazon-elastic-container-service#creating-the-workflow
      - name: Configure AWS credentials (staging)
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID_STAGING }}:role/navigator-frontend-github-actions
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: eu-west-1
      - name: Login to Amazon ECR (staging)
        id: login-ecr-staging
        uses: aws-actions/amazon-ecr-login@376925c9d111252e87ae59691e5a442dd100ef6a
      - name: Build, tag, and push image to Amazon ECR (staging)
        id: build-image-staging
        env:
          ECR_REGISTRY: ${{ secrets.DOCKER_REGISTRY_STAGING }}
          IMAGE_TAG: ${{ github.sha }}
          AWS_REGION: eu-west-1
          ECR_REPOSITORY: navigator-frontend-${{ matrix.theme }}
          THEME: ${{ matrix.theme }}
        run: |
          docker build --build-arg THEME=${THEME} -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      - name: Configure aws credentials (production)
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID_PROD }}:role/navigator-frontend-github-actions
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: eu-west-1
      - name: Login to Amazon ECR (production)
        id: login-ecr-prod
        uses: aws-actions/amazon-ecr-login@376925c9d111252e87ae59691e5a442dd100ef6a

      - name: Build, tag, and push image to Amazon ECR (production)
        id: build-image-prod
        env:
          ECR_REGISTRY: ${{ secrets.DOCKER_REGISTRY_PROD }}
          IMAGE_TAG: ${{ github.sha }}
          AWS_REGION: eu-west-1
          ECR_REPOSITORY: navigator-frontend-${{ matrix.theme }}
          THEME: ${{ matrix.theme }}
        run: |
          docker build --build-arg THEME=${THEME} -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

  storybook:
    runs-on: ubuntu-latest
    env:
      THEME: cpr
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22.13.0
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-1
      - name: Generate tsconfig.json
        run: |
          cp tsconfig.base.json tsconfig.json
          sed -i "s/__THEME__/$THEME/g" tsconfig.json
      - run: npm install
      - run: npm run build-storybook
      - name: Upload to S3
        run: |
          aws s3 sync --delete ./storybook-static s3://storybook.climatepolicyradar.org
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: eu-west-1

  # cleanup-lhci-pr-data:
  #   runs-on: ubuntu-latest
  #   needs: [lhci-desktop, lhci-mobile]
  #   steps:
  #     - uses: actions/checkout@v6
  #     - name: Trigger downstream workflow
  #       run: |
  #         curl -X POST \
  #           -H "Authorization: token ${{ secrets.GITHUB_TOKEN }}" \
  #           -H "Accept: application/vnd.github.v3+json" \
  #           https://api.github.com/repos/${{ github.repository_owner }}/navigator-infra/dispatches \
  #           -d '{"event_type":"cleanup_lhci","client_payload":{"commit_hash":"${{ github.sha }}","source_repo":"${{ github.repository }}"}}'

  changes:
    runs-on: ubuntu-latest
    outputs:
      projects: ${{ steps.parse.outputs.projects }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            staging-frontend-cpr:
              - 'infra/Pulumi.cpr-staging.yaml'
              - 'infra/__main__.py'

            staging-frontend-mcf:
              - 'infra/Pulumi.mcf-staging.yaml'
              - 'infra/__main__.py'

            staging-frontend-cclw:
              - 'infra/Pulumi.cclw-staging.yaml'
              - 'infra/__main__.py'

            staging-frontend-ccc:
              - 'infra/Pulumi.ccc-staging.yaml'
              - 'infra/__main__.py'

            staging-shared-resources:
              - 'infra/platform/**'

            production-frontend-cpr:
              - 'infra/Pulumi.cpr-production.yaml'
              - 'infra/__main__.py'

            production-frontend-mcf:
              - 'infra/Pulumi.mcf-production.yaml'
              - 'infra/__main__.py'

            production-frontend-cclw:
              - 'infra/Pulumi.cclw-production.yaml'
              - 'infra/__main__.py'

            production-frontend-ccc:
              - 'infra/Pulumi.ccc-production.yaml'
              - 'infra/__main__.py'

      - id: parse
        run: |
          CHANGES='${{ steps.filter.outputs.changes }}'
          CHANGES=${CHANGES:-[]}
          echo "projects=$(echo "$CHANGES" | jq -c '.')" >> "$GITHUB_OUTPUT"

  pulumi-up:
    needs: changes
    if: needs.changes.outputs.projects != '[]'
    runs-on: ubuntu-latest
    environment: ${{ startsWith(matrix.project, 'production-') && 'production' || 'staging' }}
    strategy:
      matrix:
        project: ${{ fromJSON(needs.changes.outputs.projects) }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7

      - name: Determine project directory
        id: project_dir
        run: |
          project="${{ matrix.project }}"
          if [[ "$project" == staging-frontend-* || "$project" == production-frontend-* ]]; then
            echo "value=infra" >> "$GITHUB_OUTPUT"
          else
            echo "value=infra/platform" >> "$GITHUB_OUTPUT"
          fi

      - name: Determine stack name
        id: stack
        run: |
          project="${{ matrix.project }}"
          if [[ "$project" =~ ^(staging|production)-frontend-([a-z0-9-]+)$ ]]; then
            environment="${BASH_REMATCH[1]}"
            theme="${BASH_REMATCH[2]}"
            echo "value=frontend/${theme}-${environment}" >> "$GITHUB_OUTPUT"
            echo "environment=${environment}" >> "$GITHUB_OUTPUT"
          elif [[ "$project" =~ ^(staging|production)-shared-resources$ ]]; then
            environment="${BASH_REMATCH[1]}"
            echo "value=platform/${environment}" >> "$GITHUB_OUTPUT"
            echo "environment=${environment}" >> "$GITHUB_OUTPUT"
          else
            echo "Unsupported project format: ${project}" >&2
            exit 1
          fi

      - name: configure aws credentials
        uses: aws-actions/configure-aws-credentials@v6.1.0
        env:
          AWS_REGION: eu-west-1
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/navigator-infra-github-actions
          role-session-name: GitHub_to_AWS_via_FederatedOIDC_${{ steps.stack.outputs.environment }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Install pulumi
        uses: pulumi/actions@v6
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}

      - name: Install dependencies
        working-directory: ${{ steps.project_dir.outputs.value }}
        run: uv sync

      - name: Pulumi up
        working-directory: ${{ steps.project_dir.outputs.value }}
        run: pulumi up --yes --skip-preview --stack climatepolicyradar/${{ steps.stack.outputs.value }}
        env:
          PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
          DEPLOY_TO_PROD_STACK_ALLOWED: true
