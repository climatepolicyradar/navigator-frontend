# trunk-ignore-all(checkov/CKV2_GHA_1)
name: Deploy review stack

on:
  pull_request:
    types: [labeled, unlabeled, synchronize, closed]
    branches: [main]

jobs:
  review-stack:
    runs-on: ubuntu-latest
    env:
      PULUMI_ACCESS_TOKEN: ${{ secrets.PULUMI_ACCESS_TOKEN }}
      ORG: climatepolicyradar
      PROJECT: frontend
    strategy:
      matrix:
        theme: [cpr, cclw, mcf, ccc]
    steps:
      - name: Check if deploy:dev label is present
        id: label_check
        env:
          LABELS_JSON: ${{ toJson(github.event.pull_request.labels.*.name) }}
        run: |
          HAS_LABEL="false"
          for label in $(echo "$LABELS_JSON" | jq -r '.[]'); do
            if [ "$label" = "deploy:dev" ]; then
              HAS_LABEL="true"
              break
            fi
          done
          echo "has_label=$HAS_LABEL" >> "$GITHUB_OUTPUT"

      - name: Determine action
        id: decide
        env:
          EVENT_ACTION: ${{ github.event.action }}
          HAS_LABEL: ${{ steps.label_check.outputs.has_label }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          THEME: ${{matrix.theme}}
        run: |
          action="none"

          if [ "$EVENT_ACTION" = "closed" ]; then
            action="destroy"
          elif [ "$HAS_LABEL" = "true" ]; then
            if [ "$EVENT_ACTION" = "labeled" ] || \
               [ "$EVENT_ACTION" = "synchronize" ]; then
              action="update"
            fi
          elif [ "$EVENT_ACTION" = "unlabeled" ]; then
            action="destroy"
          fi

          echo "action=$action" >> "$GITHUB_OUTPUT"
          echo "stack_name=pr-${THEME}-navigator-frontend-${PR_NUMBER}" >> "$GITHUB_OUTPUT"

      - name: Create ${{matrix.theme}} stack (if needed)
        if: steps.decide.outputs.action == 'update'
        env:
          STACK_NAME: ${{ steps.decide.outputs.stack_name }}
        run: |
          status=$(curl -s -o /dev/null -w "%{http_code}" -X POST \
            -H "Authorization: token ${PULUMI_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.pulumi.com/api/stacks/${ORG}/${PROJECT}" \
            -d "{\"stackName\": \"${STACK_NAME}\"}")

          if [ "$status" -ne 200 ] && [ "$status" -ne 409 ]; then
            echo "Failed to create stack: HTTP $status"
            exit 1
          fi
          echo "Stack ready (HTTP $status)"

      - name: Configure ${{matrix.theme}} stack deployment settings
        if: steps.decide.outputs.action == 'update'
        env:
          STACK_NAME: ${{ steps.decide.outputs.stack_name }}
          GITHUB_INSTALLATION_ID: ${{secrets.PULUMI_INTEGRATION_ID}}
          THEME: ${{matrix.theme}}
        run: |
          # Apply deployment settings so the stack knows where to find
          # source code, how to authenticate, and which ESC environment
          # to use. The gitHub block provides repo access via the Pulumi
          # GitHub App. Config is copied from cpr-review at deploy time
          # via a preRunCommand.
          curl -fsSL -X POST \
            -H "Authorization: token ${PULUMI_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.pulumi.com/api/stacks/${ORG}/${PROJECT}/${STACK_NAME}/deployments/settings" \
            -d "{
              \"sourceContext\": {
                \"git\": {
                  \"branch\": \"main\",
                  \"repoDir\": \"infra\"
                }
              },
              \"gitHub\": {
                \"repository\": \"climatepolicyradar/navigator-frontend\",
                \"installationId\": \"${GITHUB_INSTALLATION_ID}\"
              },
              \"operationContext\": {
                \"preRunCommands\": [
                  \"pulumi config env add ${PROJECT}/${THEME}-review --yes --stack ${ORG}/${PROJECT}/${STACK_NAME} || true\",
                  \"pulumi config cp -d ${ORG}/${PROJECT}/${STACK_NAME} -s ${ORG}/${PROJECT}/${THEME}-review\"
                ],
                \"options\": {
                  \"skipIntermediateDeployments\": true
                }
              }
            }"

          echo "Deployment settings configured for ${STACK_NAME}"

      - name: Trigger update deployment for ${{matrix.theme}}
        if: steps.decide.outputs.action == 'update'
        env:
          STACK_NAME: ${{ steps.decide.outputs.stack_name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          BRANCH: ${{ github.head_ref }}
        run: |
          response=$(curl -fsSL -w "\n%{http_code}" -X POST \
            -H "Authorization: token ${PULUMI_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.pulumi.com/api/stacks/${ORG}/${PROJECT}/${STACK_NAME}/deployments" \
            -d "{
              \"operation\": \"update\",
              \"inheritSettings\": true,
              \"sourceContext\": {
                \"git\": {
                  \"branch\": \"refs/heads/${BRANCH}\"
                }
              },
              \"operationContext\": {
                \"environmentVariables\": {
                  \"PR_NUMBER\": \"${PR_NUMBER}\"
                }
              }
            }")

          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n1)
          echo "Deployment triggered: HTTP $status"
          echo "$body" | jq .

          if [ "$status" -lt 200 ] || [ "$status" -ge 300 ]; then
            echo "Failed to trigger deployment"
            exit 1
          fi

      - name: Trigger destroy deployment for ${{matrix.theme}}
        if: steps.decide.outputs.action == 'destroy'
        env:
          STACK_NAME: ${{ steps.decide.outputs.stack_name }}
        run: |
          # Check if the stack exists before attempting destroy
          stack_status=$(curl -s -o /dev/null -w "%{http_code}" \
            -H "Authorization: token ${PULUMI_ACCESS_TOKEN}" \
            "https://api.pulumi.com/api/stacks/${ORG}/${PROJECT}/${STACK_NAME}")

          if [ "$stack_status" -eq 404 ]; then
            echo "Stack ${STACK_NAME} does not exist, nothing to destroy"
            exit 0
          fi

          response=$(curl -fsSL -w "\n%{http_code}" -X POST \
            -H "Authorization: token ${PULUMI_ACCESS_TOKEN}" \
            -H "Content-Type: application/json" \
            "https://api.pulumi.com/api/stacks/${ORG}/${PROJECT}/${STACK_NAME}/deployments" \
            -d "{
              \"operation\": \"destroy\",
              \"inheritSettings\": true,
              \"operationContext\": {
                \"options\": {
                  \"deleteAfterDestroy\": true
                }
              }
            }")

          body=$(echo "$response" | head -n -1)
          status=$(echo "$response" | tail -n1)
          echo "Destroy triggered: HTTP $status"
          echo "$body" | jq .
