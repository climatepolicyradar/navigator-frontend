name: Deploy to staging
on:
  # a. Auto deploy once the merge-to-main action is completed successfully
  workflow_run:
    workflows: [Merge to main]
    types:
      - completed
    branches:
      - main
  # b. Allow deployment from the actions tab - this allows feature branch deployment
  workflow_dispatch: {}

permissions:
  id-token: write
  contents: read

jobs:
  deploy-staging:
    name: Deploy ${{ github.sha }} to staging
    # relating to a, b, c in the `on` section
    if: |
      github.event.workflow_run.conclusion == 'success' ||
      github.event_name == 'workflow_dispatch'
    strategy:
      matrix:
        theme: [cpr, cclw, mcf, ccc]

    runs-on: ubuntu-latest
    environment: staging
    steps:
      - uses: actions/checkout@v6
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v6.2.0
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/navigator-new-frontend-github-actions
          role-session-name: GitHub_to_AWS_via_FederatedOIDC
          aws-region: eu-west-1

      - name: Login to Amazon ECR (staging)
        id: login-ecr-staging
        uses: aws-actions/amazon-ecr-login@d539f0932e70871a027e9d5a9d8fc38589180a64

      - name: Build, tag, and push to ECR with 'latest' tag
        id: build-image
        env:
          ECR_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
          IMAGE_TAG: latest
          AWS_REGION: eu-west-1
          ECR_REPOSITORY: navigator-frontend-${{ matrix.theme }}
          THEME: ${{ matrix.theme }}
        # @related: GITHUB_SHA_ENV_VAR
        run: |
          docker build --build-arg THEME=${THEME} --build-arg GITHUB_SHA=$(git rev-parse HEAD) -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG .
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG
          echo "image=$ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG" >> $GITHUB_OUTPUT

      # @see: https://github.com/marketplace/actions/amazon-ecs-deploy-express-service-action-for-github-actions#complete-example-with-all-options
      - name: Deploy to ECS (staging)
        id: deploy-staging
        uses: aws-actions/amazon-ecs-deploy-express-service@v1
        with:
          cluster: frontend-staging
          service-name: ${{ matrix.theme }}-staging-frontend
          image: ${{ steps.build-image.outputs.image }}
          execution-role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/frontend-staging-ecs-task-execution-role
          infrastructure-role-arn: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/frontend-staging-ecs-task-infrastructure-role

      - name: Verify staging deployment outcome
        env:
          SERVICE_ARN: ${{ steps.deploy-staging.outputs.service-arn }}
        run: |
          set -euo pipefail
          if [[ -z "${SERVICE_ARN}" ]]; then
            echo "::error::deploy step did not emit a service-arn output"
            exit 1
          fi
          DEPLOY_ARN=$(aws ecs list-service-deployments \
            --cluster frontend-staging \
            --service "${SERVICE_ARN}" \
            --query 'serviceDeployments[0].serviceDeploymentArn' \
            --output text)
          if [[ -z "${DEPLOY_ARN}" || "${DEPLOY_ARN}" == "None" ]]; then
            echo "::error::Could not find a service deployment for ${SERVICE_ARN}"
            exit 1
          fi
          STATUS=$(aws ecs describe-service-deployments \
            --service-deployment-arns "${DEPLOY_ARN}" \
            --query 'serviceDeployments[0].status' \
            --output text)
          echo "Deployment ${DEPLOY_ARN} final status: ${STATUS}"
          if [[ "${STATUS}" != "SUCCESSFUL" ]]; then
            echo "::error::Deployment did not succeed (status=${STATUS})"
            exit 1
          fi
